name: Docusaurus Tests

on:
  workflow_call:
    inputs:
      soft-fail:
        description: 'Whether to continue on test failures'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  docusaurus:
    name: Docusaurus Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for Codecov OIDC
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: docs/docusaurus/package-lock.json

      - name: Install dependencies
        working-directory: docs/docusaurus
        run: npm ci

      - name: Lint accessibility
        working-directory: docs/docusaurus
        run: npm run lint:a11y

      - name: Run tests
        working-directory: docs/docusaurus
        run: npm run test:coverage
        env:
          COLLECTIONS_DIR: ${{ github.workspace }}/collections
        continue-on-error: ${{ inputs.soft-fail }}

      - name: Upload to Codecov
        if: success()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: docs/docusaurus/coverage/lcov.info
          use_oidc: true
          fail_ci_if_error: false
          verbose: true
          flags: docusaurus
          name: docusaurus-coverage
        continue-on-error: true

      - name: Build site
        working-directory: docs/docusaurus
        run: npm run build

      - name: Resolve puppeteer version
        id: puppeteer-version
        working-directory: docs/docusaurus
        run: echo "version=$(node -p "require('puppeteer/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache puppeteer Chrome
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-v2-${{ runner.os }}-${{ steps.puppeteer-version.outputs.version }}-${{ hashFiles('docs/docusaurus/package-lock.json') }}
          restore-keys: |
            puppeteer-v2-${{ runner.os }}-${{ steps.puppeteer-version.outputs.version }}-
            puppeteer-v2-${{ runner.os }}-

      - name: Install Chrome for pa11y (puppeteer)
        working-directory: docs/docusaurus
        run: |
          set -u
          # pa11y launches the Chrome build that puppeteer resolves via
          # executablePath(). Two independent failure modes have to be handled:
          #   1. A restored cache can leave a build folder without its binary;
          #      `browsers install` then refuses to re-download and fails with
          #      "the executable ... is missing".
          #   2. The download from the Chrome CDN is intermittently flaky on
          #      hosted runners, leaving the folder present but the binary
          #      absent even on a clean cache.
          # Both are recoverable by removing the resolved build directory and
          # retrying the download. Verify against the exact path puppeteer
          # resolves, and on terminal failure dump diagnostics so the real
          # cause is visible instead of a bare "missing" line.
          chrome_path() { node -p "require('puppeteer').executablePath()"; }
          install_chrome() {
            # Remove the specific build dir so `browsers install` performs a
            # real download instead of treating a partial folder as complete.
            local target
            target="$(chrome_path)"
            rm -rf "$(dirname "$(dirname "$target")")"
            npx puppeteer browsers install chrome
          }
          attempt=0
          max_attempts=3
          until [ -x "$(chrome_path)" ]; do
            attempt=$((attempt + 1))
            if [ "$attempt" -gt "$max_attempts" ]; then
              echo "::error::Chrome install failed after ${max_attempts} attempts"
              echo "Resolved executablePath: $(chrome_path)"
              echo "--- contents of puppeteer cache ---"
              ls -laR "$HOME/.cache/puppeteer" || echo "(cache directory absent)"
              exit 1
            fi
            echo "Chrome not present (attempt ${attempt}/${max_attempts}); installing..."
            install_chrome || true
          done
          echo "Chrome executable present at $(chrome_path)"

      - name: Accessibility scan (pa11y-ci)
        working-directory: docs/docusaurus
        run: |
          npm run serve:ci &
          npx wait-on -t 60000 http-get://127.0.0.1:3001/hve-core/
          npm run a11y:ci
        continue-on-error: ${{ inputs.soft-fail }}

      - name: Resolve Playwright version
        id: playwright-version
        working-directory: docs/docusaurus
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}-${{ hashFiles('docs/docusaurus/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}-
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        working-directory: docs/docusaurus
        run: npx playwright install --with-deps chromium

      - name: Accessibility journeys (Playwright)
        working-directory: docs/docusaurus
        run: npm run test:e2e
        continue-on-error: ${{ inputs.soft-fail }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docusaurus-test-results
          path: docs/docusaurus/test-results/
          retention-days: 30
          if-no-files-found: ignore
